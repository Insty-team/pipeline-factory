services:
  pipeline:
    build: .
    container_name: pipeline-factory
    volumes:
      # 데이터 영속성
      - ./data:/app/data
      # 환경 변수 (API 키)
      - ./.env:/app/.env:ro
      # Claude CLI 인증 (호스트의 인증 정보 공유)
      - ~/.claude:/root/.claude:ro
    environment:
      - TZ=Asia/Seoul
    # 단일 사이클 실행 (기본)
    # 24/7 모드는 entrypoint 변경으로 전환
    command: python orchestrator.py

  # 24/7 자동 사이클 모드
  pipeline-loop:
    build: .
    container_name: pipeline-factory-loop
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ~/.claude:/root/.claude:ro
    environment:
      - TZ=Asia/Seoul
      - CYCLE_INTERVAL=21600  # 6시간 (초)
    command: python loop.py
    restart: unless-stopped
    profiles:
      - loop  # docker compose --profile loop up 으로만 실행
